name: Publish to npm

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write  # Required for gh release create
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
      - name: Inject SDK hash from git commit
        run: echo "export const SDK_HASH = '${{ github.sha }}';" > src/hash.ts
      - run: npm run build
      - name: Sync version from tag
        run: npm version --no-git-tag-version ${GITHUB_REF#refs/tags/v}
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          SDK_HASH: ${{ github.sha }}

      - name: Create GitHub Release
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            --title "${GITHUB_REF#refs/tags/}" \
            --generate-notes \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Notify logs-server
        run: |
          curl -s -X POST https://api.logs.codexs.cn/api/v1/sdk/webhook \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: ${{ secrets.WEBHOOK_SECRET }}" \
            -d "{\"sdk_type\":\"js\",\"sdk_version\":\"${GITHUB_REF#refs/tags/}\",\"sdk_hash\":\"${{ github.sha }}\"}"
